syntax = "proto3";

package openpi.examples.pi0grpc;

enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  POLICY_TYPE_DROID = 1;
  POLICY_TYPE_ALOHA = 2;
  POLICY_TYPE_LIBERO = 3;
}

message NdArray {
  bytes data = 1;
  repeated int64 shape = 2;
  string dtype = 3;
}

message DroidInput {
  NdArray exterior_image_left = 1;
  NdArray wrist_image_left = 2;
  NdArray joint_position = 3;
  NdArray gripper_position = 4;
  string prompt = 5;
}

message AlohaInput {
  NdArray state = 1;
  map<string, NdArray> images = 2;
  string prompt = 3;
}

message LiberoInput {
  NdArray state = 1;
  NdArray image = 2;
  NdArray wrist_image = 3;
  string prompt = 4;
}

message EvalRequest {
  string request_id = 1;
  PolicyType policy_type = 2;

  oneof policy_input {
    DroidInput droid = 10;
    AlohaInput aloha = 11;
    LiberoInput libero = 12;
  }
}

message PrefixRequest {
  string request_id = 1;
  EvalRequest eval_request = 2;
}

enum KVTransferMode {
  KV_TRANSFER_MODE_PROTO_BYTES = 0;
  KV_TRANSFER_MODE_GPU_IPC = 1;
}

message GpuIpcHandle {
  string handle_id = 1;
  repeated int64 shape = 2;
  string dtype = 3;
  int32 device_index = 4;
  uint64 nbytes = 5;
}

message KVCacheChunk {
  string request_id = 1;
  int32 layer_idx = 2;
  NdArray key = 3;
  NdArray value = 4;
  NdArray prefix_pad_mask = 5;
  bool has_prefix_pad_mask = 6;
  KVTransferMode transfer_mode = 7;
  GpuIpcHandle key_handle = 8;
  GpuIpcHandle value_handle = 9;
  GpuIpcHandle prefix_pad_mask_handle = 10;
}

message EvalResponse {
  string request_id = 1;
  NdArray actions = 2;
  string message = 3;
}

enum SuffixExecutionMode {
  SUFFIX_EXECUTION_MODE_UNSPECIFIED = 0;
  SUFFIX_EXECUTION_MODE_LAYER_PIPELINE_V1 = 1;
  SUFFIX_EXECUTION_MODE_ASYNC_CACHE_V2 = 2;
}

message LayerPipelineConfig {
  bool strict_layer_ordering = 1;
  uint32 warmup_diffusion_steps = 2;
  bool fail_on_missing_layer = 3;
}

message AsyncCacheConfig {
  uint32 max_inflight_updates = 1;
  uint32 cache_ttl_ms = 2;
  bool allow_stale_cache = 3;
  uint32 max_staleness_layers = 4;
  bool drop_late_updates = 5;
}

message ExecutionConfig {
  SuffixExecutionMode mode = 1;
  bool require_baseline_equivalence = 2;

  oneof mode_config {
    LayerPipelineConfig v1 = 10;
    AsyncCacheConfig v2 = 11;
  }
}

message EvaluatePipelineRequest {
  EvalRequest eval_request = 1;
  ExecutionConfig execution = 2;
}

enum EvalOperationState {
  EVAL_OP_STATE_UNSPECIFIED = 0;
  EVAL_OP_STATE_QUEUED = 1;
  EVAL_OP_STATE_RUNNING = 2;
  EVAL_OP_STATE_SUCCEEDED = 3;
  EVAL_OP_STATE_FAILED = 4;
  EVAL_OP_STATE_CANCELLED = 5;
}

message SubmitEvaluateRequest {
  EvaluatePipelineRequest request = 1;
  bool wait_for_result = 2;
}

message SubmitEvaluateResponse {
  string operation_id = 1;
  EvalOperationState state = 2;
  EvalResponse result = 3;
  string message = 4;
}

message GetEvaluateResultRequest {
  string operation_id = 1;
}

message GetEvaluateResultResponse {
  string operation_id = 1;
  EvalOperationState state = 2;
  EvalResponse result = 3;
  string error = 4;
}

message WatchEvaluateRequest {
  string operation_id = 1;
}

message EvaluateEvent {
  string operation_id = 1;
  EvalOperationState state = 2;
  int32 layer_idx = 3;
  int64 cache_epoch = 4;
  string event = 5;
  string details = 6;
}

message CancelEvaluateRequest {
  string operation_id = 1;
}

message CancelEvaluateResponse {
  bool cancelled = 1;
}

service PrefixService {
  rpc StreamPrefixKV(PrefixRequest) returns (stream KVCacheChunk);
}

service SuffixService {
  rpc Evaluate(EvalRequest) returns (EvalResponse);
  rpc EvaluateLayerPipeline(EvaluatePipelineRequest) returns (EvalResponse);
  rpc SubmitEvaluate(SubmitEvaluateRequest) returns (SubmitEvaluateResponse);
  rpc GetEvaluateResult(GetEvaluateResultRequest) returns (GetEvaluateResultResponse);
  rpc WatchEvaluate(WatchEvaluateRequest) returns (stream EvaluateEvent);
  rpc CancelEvaluate(CancelEvaluateRequest) returns (CancelEvaluateResponse);
}
