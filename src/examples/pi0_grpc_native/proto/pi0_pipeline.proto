syntax = "proto3";

package openpi.examples.pi0grpc;

enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  POLICY_TYPE_DROID = 1;
  POLICY_TYPE_ALOHA = 2;
  POLICY_TYPE_LIBERO = 3;
}

message NdArray {
  bytes data = 1;
  repeated int64 shape = 2;
  string dtype = 3;
}

message InferenceConfig {
  int32 num_layers = 1;
  int32 hidden_size = 2;
  int32 prefix_tokens = 3;
  int32 suffix_tokens = 4;
  float compute_delay_s = 5;
  float poll_interval_s = 6;
  int32 seed = 7;
}

message DroidInput {
  NdArray exterior_image_left = 1;
  NdArray wrist_image_left = 2;
  NdArray joint_position = 3;
  NdArray gripper_position = 4;
  string prompt = 5;
}

message AlohaInput {
  NdArray state = 1;
  map<string, NdArray> images = 2;
  string prompt = 3;
}

message LiberoInput {
  NdArray state = 1;
  NdArray image = 2;
  NdArray wrist_image = 3;
  string prompt = 4;
}

message EvalRequest {
  string request_id = 1;
  PolicyType policy_type = 2;
  InferenceConfig inference = 3;

  oneof policy_input {
    DroidInput droid = 10;
    AlohaInput aloha = 11;
    LiberoInput libero = 12;
  }
}

message PrefixRequest {
  string request_id = 1;
  EvalRequest eval_request = 2;
}

message KVCacheChunk {
  string request_id = 1;
  int32 layer_idx = 2;
  NdArray key = 3;
  NdArray value = 4;
  NdArray prefix_pad_mask = 5;
  bool has_prefix_pad_mask = 6;
}

message EvalResponse {
  string request_id = 1;
  NdArray actions = 2;
  string message = 3;
}

service PrefixService {
  rpc StreamPrefixKV(PrefixRequest) returns (stream KVCacheChunk);
}

service SuffixService {
  rpc Evaluate(EvalRequest) returns (EvalResponse);
}
